<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vindexes | Private Clarity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f;
  --gold: #c9a96e;
  --gold-light: #e2c898;
  --gold-dark: #8b6914;
  --silver: #7a8fa6;
  --silver-light: #a8bfcc;
  --white: #f0ede8;
  --border: rgba(201,169,110,0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; font-weight: 300; overflow: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(201,169,110,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(201,169,110,0.025) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; z-index: 0; }
.orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 70%); top: -150px; right: -100px; animation: orbFloat 14s ease-in-out infinite; }
.orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(94,189,138,0.03) 0%, transparent 70%); bottom: 50px; left: 100px; animation: orbFloat 18s ease-in-out infinite reverse; }
@keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 33% { transform: translate(20px,-15px); } 66% { transform: translate(-15px,20px); } }
.container { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
.logo { display: flex; align-items: center; gap: 14px; margin-bottom: 4.5rem; opacity: 0; animation: fadeUp 0.8s ease forwards 0.2s; }
.logo-mark svg { width: 36px; height: 36px; }
.logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.2em; color: var(--white); }
.logo-text span { color: var(--gold); }
.eyebrow { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.8s ease forwards 0.5s; }
.eyebrow-line { width: 40px; height: 1px; background: var(--gold); opacity: 0.6; }
.eyebrow-text { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 300; line-height: 1.05; margin-bottom: 0.3rem; opacity: 0; animation: fadeUp 1s ease forwards 0.7s; }
h1 em { font-style: italic; color: var(--gold); }
h1 .block { display: block; }
.divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 2.2rem auto; opacity: 0; animation: fadeUp 0.8s ease forwards 1s; }
.tagline { font-family: 'Cormorant Garamond', serif; font-size: clamp(1rem, 2vw, 1.2rem); font-style: italic; color: var(--silver-light); margin-bottom: 0.7rem; opacity: 0; animation: fadeUp 0.8s ease forwards 1.1s; }
.cn-slogan { font-family: 'Noto Serif TC', serif; font-size: 0.8rem; color: var(--silver); letter-spacing: 0.12em; margin-bottom: 4rem; opacity: 0; animation: fadeUp 0.8s ease forwards 1.3s; }
.notify-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; opacity: 0; animation: fadeUp 0.8s ease forwards 1.5s; }
.notify-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--silver); }
.notify-form { display: flex; gap: 0; border: 1px solid var(--border); overflow: hidden; width: 360px; max-width: 100%; }
.notify-input { flex: 1; padding: 13px 18px; background: rgba(255,255,255,0.03); border: none; color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 300; outline: none; letter-spacing: 0.05em; }
.notify-input::placeholder { color: var(--silver); }
.notify-btn { padding: 13px 22px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); border: none; color: #06090f; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
.notify-btn:hover { background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%); }
.notify-success { display: none; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.1em; }
.orb-visual { position: fixed; right: 8vw; top: 50%; transform: translateY(-50%); width: 300px; height: 300px; pointer-events: none; opacity: 0; animation: fadeIn 2s ease forwards 1s; z-index: 0; }
.v-ring { position: absolute; border-radius: 50%; border: 1px solid; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.v-ring-1 { width: 280px; height: 280px; border-color: rgba(201,169,110,0.06); animation: rPulse 7s ease-in-out infinite; }
.v-ring-2 { width: 210px; height: 210px; border-color: rgba(201,169,110,0.1); animation: rPulse 7s ease-in-out infinite 1.2s; }
.v-ring-3 { width: 140px; height: 140px; border-color: rgba(201,169,110,0.18); animation: rPulse 7s ease-in-out infinite 2.4s; }
.v-ring-4 { width: 70px; height: 70px; border-color: rgba(201,169,110,0.3); animation: rPulse 7s ease-in-out infinite 3.6s; }
@keyframes rPulse { 0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1.03); } }
.v-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold) 40%, var(--gold-dark) 70%, #3d2d08); box-shadow: 0 0 40px rgba(201,169,110,0.35), 0 0 80px rgba(201,169,110,0.12); animation: corePulse 6s ease-in-out infinite; }
@keyframes corePulse { 0%, 100% { box-shadow: 0 0 40px rgba(201,169,110,0.35), 0 0 80px rgba(201,169,110,0.12); } 50% { box-shadow: 0 0 55px rgba(201,169,110,0.5), 0 0 110px rgba(201,169,110,0.18); } }
.footer { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 2.5rem; z-index: 1; opacity: 0; animation: fadeIn 1s ease forwards 2s; white-space: nowrap; }
.footer a { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(122,143,166,0.5); text-decoration: none; transition: color 0.3s; }
.footer a:hover { color: var(--gold); }
.footer-dot { width: 2px; height: 2px; border-radius: 50%; background: rgba(122,143,166,0.3); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@media (max-width: 768px) { .orb-visual { display: none; } }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb-visual">
  <div class="v-ring v-ring-1"></div>
  <div class="v-ring v-ring-2"></div>
  <div class="v-ring v-ring-3"></div>
  <div class="v-ring v-ring-4"></div>
  <div class="v-core"></div>
</div>
<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="16" stroke="#c9a96e" stroke-width="0.8" opacity="0.35"/>
        <circle cx="18" cy="18" r="11" stroke="#c9a96e" stroke-width="0.8" opacity="0.55"/>
        <circle cx="18" cy="18" r="6.5" stroke="#c9a96e" stroke-width="0.8" opacity="0.75"/>
        <circle cx="18" cy="18" r="2.8" fill="#c9a96e"/>
        <line x1="18" y1="2" x2="18" y2="7" stroke="#c9a96e" stroke-width="0.8" opacity="0.4"/>
        <line x1="18" y1="29" x2="18" y2="34" stroke="#c9a96e" stroke-width="0.8" opacity="0.4"/>
        <line x1="2" y1="18" x2="7" y2="18" stroke="#c9a96e" stroke-width="0.8" opacity="0.4"/>
        <line x1="29" y1="18" x2="34" y2="18" stroke="#c9a96e" stroke-width="0.8" opacity="0.4"/>
      </svg>
    </div>
    <span class="logo-text">VINDE<span>X</span>ES</span>
  </div>
  <div class="eyebrow">
    <div class="eyebrow-line"></div>
    <span class="eyebrow-text">Coming Soon · Private Intelligence</span>
    <div class="eyebrow-line"></div>
  </div>
  <h1>
    <em>Private</em>
    <span class="block">Clarity.</span>
  </h1>
  <div class="divider"></div>
  <p class="tagline">Institutional Intelligence for the Serious Investor.</p>
  <p class="cn-slogan">紛擾在市場之外，洞察在耳語之間。</p>
  <div class="notify-wrap">
    <span class="notify-label">搶先獲得上線通知</span>
    <div class="notify-form">
      <input type="email" class="notify-input" placeholder="your@email.com" id="emailInput">
      <button class="notify-btn" onclick="handleNotify()">通知我</button>
    </div>
    <span class="notify-success" id="successMsg">✓ &nbsp;已登記，上線時我們會第一時間通知您</span>
  </div>
</div>
<div class="footer">
  <a href="https://t.me/taiwan_stock_research" target="_blank">Telegram 頻道</a>
  <div class="footer-dot"></div>
  <a href="https://t.me/Taiwan_Stock_ResearchBot" target="_blank">訂閱 Bot</a>
  <div class="footer-dot"></div>
  <span style="font-size:0.55rem;letter-spacing:0.15em;color:rgba(122,143,166,0.3);">© 2025 VINDEXES · SINGAPORE</span>
</div>
<script>
function handleNotify() {
  const input = document.getElementById('emailInput');
  const success = document.getElementById('successMsg');
  const form = document.querySelector('.notify-form');
  if (!input.value || !input.value.includes('@')) { input.style.borderLeft = '2px solid rgba(201,169,110,0.5)'; input.focus(); return; }
  form.style.opacity = '0'; form.style.transition = 'opacity 0.4s';
  setTimeout(() => { form.style.display = 'none'; success.style.display = 'block'; }, 400);
}
document.getElementById('emailInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleNotify(); });
</script>
</body>
</html>
